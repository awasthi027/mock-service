spring:
  datasource:
    # PostgreSQL mode keeps SQL behavior closer to production for tests.
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jpa:
    hibernate:
      # Use test schema.sql instead of Hibernate auto-DDL (avoids JSONB DDL issues).
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  h2:
    console:
      enabled: true

server:
  port: 8080
